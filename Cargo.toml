[package]
name = "nametag"
version = "0.1.0"
edition = "2024"
description = "Immutable tag naming convention tool — parse, lint, and search identifiers across languages"
license = "MIT"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
thiserror = "2"
