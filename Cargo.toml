[package]
name = "tagpath"
version = "0.1.0"
edition = "2024"
description = "Tag Path — parse, lint, and search tag-based identifiers across languages"
license = "MIT"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
thiserror = "2"
