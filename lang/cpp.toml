version = 1
name = "cpp"

convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "snake_case"

[contexts.function]
convention = "snake_case"

[contexts.class]
convention = "PascalCase"

[contexts.struct]
convention = "PascalCase"

[contexts.enum]
convention = "PascalCase"

[contexts.enum_member]
convention = "PascalCase"

[contexts.constant]
convention = "UPPER_SNAKE_CASE"

[contexts.macro]
convention = "UPPER_SNAKE_CASE"

[contexts.method]
convention = "snake_case"

[contexts.parameter]
convention = "snake_case"

[contexts.namespace]
convention = "snake_case"

[contexts.template_parameter]
convention = "PascalCase"

[contexts.file]
convention = "snake_case"

[patterns]
factory = "create_{name}"
getter = "{name}"
setter = "set_{name}"
predicate = "is_{name}"
type = "{Name}"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
