version: 1
name: sql

convention: snake_case
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  keyword:
    convention: UPPER_SNAKE_CASE
  table:
    convention: snake_case
  column:
    convention: snake_case
  function:
    convention: snake_case
  procedure:
    convention: snake_case
  view:
    convention: snake_case
  index:
    convention: snake_case
    prefix: "idx_"
  constraint:
    convention: snake_case
  trigger:
    convention: snake_case
    prefix: "trg_"
  alias:
    convention: snake_case
  schema:
    convention: snake_case

patterns:
  primary_key: "{table}_pkey"
  foreign_key: "fk_{table}_{column}"
  index: "idx_{table}_{column}"
  unique: "uq_{table}_{column}"
  type: "{Name}"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
