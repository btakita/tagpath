version: 1
name: csharp

convention: PascalCase
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: camelCase
  method:
    convention: PascalCase
  property:
    convention: PascalCase
  class:
    convention: PascalCase
  interface:
    convention: PascalCase
    prefix: "I"
  enum:
    convention: PascalCase
  enum_member:
    convention: PascalCase
  constant:
    convention: PascalCase
  parameter:
    convention: camelCase
  field:
    convention: camelCase
    prefix: "_"
  namespace:
    convention: PascalCase
  event:
    convention: PascalCase
  delegate:
    convention: PascalCase
  file:
    convention: PascalCase

patterns:
  factory: "Create{Name}"
  getter: "{Name}"
  setter: "{Name}"
  predicate: "Is{Name}"
  async: "{Name}Async"
  type: "{Name}"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
