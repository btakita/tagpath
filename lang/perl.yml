version: 1
name: perl

convention: snake_case
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: snake_case
  scalar:
    convention: snake_case
    prefix: "$"                    # $my_var
  array:
    convention: snake_case
    prefix: "@"                    # @my_array
  hash:
    convention: snake_case
    prefix: "%"                    # %my_hash
  function:
    convention: snake_case
  method:
    convention: snake_case
  constant:
    convention: UPPER_SNAKE_CASE
  package:
    convention: PascalCase         # My::Package::Name
    separator: "::"
  class:
    convention: PascalCase         # Moose/Moo classes
  file:
    convention: PascalCase         # Module files match package: My/Package.pm
    suffix: ".pm"
  private:
    convention: snake_case
    prefix: "_"                    # _private_method

patterns:
  factory: "new"                   # My::Class->new()
  predicate: "is_{name}"
  getter: "{name}"                 # accessor
  setter: "set_{name}"
  callback: "on_{name}"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
