version = 1
name = "perl"

convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "snake_case"

[contexts.scalar]
convention = "snake_case"
prefix = "$"                      # $my_var

[contexts.array]
convention = "snake_case"
prefix = "@"                      # @my_array

[contexts.hash]
convention = "snake_case"
prefix = "%"                      # %my_hash

[contexts.function]
convention = "snake_case"

[contexts.method]
convention = "snake_case"

[contexts.constant]
convention = "UPPER_SNAKE_CASE"

[contexts.package]
convention = "PascalCase"         # My::Package::Name
separator = "::"

[contexts.class]
convention = "PascalCase"         # Moose/Moo classes

[contexts.file]
convention = "PascalCase"         # Module files match package: My/Package.pm
suffix = ".pm"

[contexts.private]
convention = "snake_case"
prefix = "_"                      # _private_method

[patterns]
factory = "new"                   # My::Class->new()
predicate = "is_{name}"
getter = "{name}"                 # accessor
setter = "set_{name}"
callback = "on_{name}"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
