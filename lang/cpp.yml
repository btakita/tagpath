version: 1
name: cpp

convention: snake_case
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: snake_case
  function:
    convention: snake_case
  class:
    convention: PascalCase
  struct:
    convention: PascalCase
  enum:
    convention: PascalCase
  enum_member:
    convention: PascalCase
  constant:
    convention: UPPER_SNAKE_CASE
  macro:
    convention: UPPER_SNAKE_CASE
  method:
    convention: snake_case
  parameter:
    convention: snake_case
  namespace:
    convention: snake_case
  template_parameter:
    convention: PascalCase
  file:
    convention: snake_case

patterns:
  factory: "create_{name}"
  getter: "{name}"
  setter: "set_{name}"
  predicate: "is_{name}"
  type: "{Name}"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
