version = 1
name = "ruby"

convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "snake_case"

[contexts.method]
convention = "snake_case"

[contexts.class]
convention = "PascalCase"

[contexts.module]
convention = "PascalCase"

[contexts.constant]
convention = "UPPER_SNAKE_CASE"

[contexts.parameter]
convention = "snake_case"

[contexts.instance_variable]
convention = "snake_case"
prefix = "@"

[contexts.class_variable]
convention = "snake_case"
prefix = "@@"

[contexts.global_variable]
convention = "snake_case"
prefix = "$"

[contexts.symbol]
convention = "snake_case"
prefix = ":"

[contexts.file]
convention = "snake_case"

[patterns]
factory = "create_{name}"
predicate = "{name}?"
bang = "{name}!"
setter = "{name}="
type = "{Name}"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
