version: 1
name: python

convention: snake_case
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: snake_case
  function:
    convention: snake_case
  class:
    convention: PascalCase
  method:
    convention: snake_case
  constant:
    convention: UPPER_SNAKE_CASE
  module:
    convention: snake_case
  package:
    convention: snake_case
  parameter:
    convention: snake_case
  private:
    convention: snake_case
    prefix: "_"
  dunder:
    convention: snake_case
    prefix: "__"
    suffix: "__"

patterns:
  factory: "create_{name}"
  hook: "use_{name}"
  setter: "set_{name}"
  type: "{Name}"
  array: "{name}_list"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
