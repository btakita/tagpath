version = 1
name = "python"

convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "snake_case"

[contexts.function]
convention = "snake_case"

[contexts.class]
convention = "PascalCase"

[contexts.method]
convention = "snake_case"

[contexts.constant]
convention = "UPPER_SNAKE_CASE"

[contexts.module]
convention = "snake_case"

[contexts.package]
convention = "snake_case"

[contexts.parameter]
convention = "snake_case"

[contexts.private]
convention = "snake_case"
prefix = "_"

[contexts.dunder]
convention = "snake_case"
prefix = "__"
suffix = "__"

[patterns]
factory = "create_{name}"
hook = "use_{name}"
setter = "set_{name}"
type = "{Name}"
array = "{name}_list"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
