version = 1
name = "php"

convention = "camelCase"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "camelCase"
prefix = "$"

[contexts.method]
convention = "camelCase"

[contexts.function]
convention = "snake_case"

[contexts.class]
convention = "PascalCase"

[contexts.interface]
convention = "PascalCase"

[contexts.trait]
convention = "PascalCase"

[contexts.enum]
convention = "PascalCase"

[contexts.enum_member]
convention = "PascalCase"

[contexts.constant]
convention = "UPPER_SNAKE_CASE"

[contexts.property]
convention = "camelCase"

[contexts.parameter]
convention = "camelCase"
prefix = "$"

[contexts.namespace]
convention = "PascalCase"

[contexts.file]
convention = "PascalCase"

[patterns]
factory = "create{Name}"
getter = "get{Name}"
setter = "set{Name}"
predicate = "is{Name}"
type = "{Name}"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
