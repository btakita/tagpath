version = 1
name = "elixir"

convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "snake_case"

[contexts.function]
convention = "snake_case"

[contexts.private_function]
convention = "snake_case"
prefix = "_"

[contexts.module]
convention = "PascalCase"

[contexts.atom]
convention = "snake_case"
prefix = ":"

[contexts.parameter]
convention = "snake_case"

[contexts.macro]
convention = "snake_case"

[contexts.file]
convention = "snake_case"

[patterns]
factory = "new_{name}"
predicate = "{name}?"
bang = "{name}!"
setter = "put_{name}"
getter = "get_{name}"
type = "{Name}"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
