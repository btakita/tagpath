version: 1
name: swift

convention: camelCase
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: camelCase
  function:
    convention: camelCase
  class:
    convention: PascalCase
  struct:
    convention: PascalCase
  protocol:
    convention: PascalCase
  enum:
    convention: PascalCase
  enum_case:
    convention: camelCase
  constant:
    convention: camelCase
  method:
    convention: camelCase
  parameter:
    convention: camelCase
  typealias:
    convention: PascalCase
  file:
    convention: PascalCase

patterns:
  factory: "make{Name}"
  predicate: "is{Name}"
  setter: "set{Name}"
  type: "{Name}"
  builder: "{Name}Builder"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
