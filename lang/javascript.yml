version: 1
name: javascript

convention: camelCase
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: camelCase
  function:
    convention: camelCase
  class:
    convention: PascalCase
  method:
    convention: camelCase
  constant:
    convention: UPPER_SNAKE_CASE
  parameter:
    convention: camelCase
  enum_member:
    convention: PascalCase
  file:
    convention: kebab-case
  package:
    convention: kebab-case

patterns:
  factory: "create_{name}"
  hook: "use_{name}"
  setter: "set_{name}"
  signal: "{name}$"
  type: "{Name}"
  array: "{name}_a"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
