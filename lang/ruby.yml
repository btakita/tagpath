version: 1
name: ruby

convention: snake_case
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: snake_case
  method:
    convention: snake_case
  class:
    convention: PascalCase
  module:
    convention: PascalCase
  constant:
    convention: UPPER_SNAKE_CASE
  parameter:
    convention: snake_case
  instance_variable:
    convention: snake_case
    prefix: "@"
  class_variable:
    convention: snake_case
    prefix: "@@"
  global_variable:
    convention: snake_case
    prefix: "$"
  symbol:
    convention: snake_case
    prefix: ":"
  file:
    convention: snake_case

patterns:
  factory: "create_{name}"
  predicate: "{name}?"
  bang: "{name}!"
  setter: "{name}="
  type: "{Name}"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
