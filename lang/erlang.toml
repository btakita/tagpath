version = 1
name = "erlang"

# Erlang/OTP — snake_case functions, lowercase atoms, PascalCase variables
convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = ":"                        # module:function

[contexts.variable]
convention = "PascalCase"              # Erlang variables are PascalCase: MyVar, Result

[contexts.function]
convention = "snake_case"              # my_function/2

[contexts.module]
convention = "snake_case"              # my_module.erl

[contexts.atom]
convention = "snake_case"              # my_atom (lowercase start, no quotes needed)

[contexts.macro]
convention = "UPPER_SNAKE_CASE"        # -define(MY_MACRO, value).
prefix = "?"                           # ?MY_MACRO when used

[contexts.record]
convention = "snake_case"              # -record(my_record, {field}).

[contexts.record_field]
convention = "snake_case"

[contexts.type]
convention = "snake_case"              # -type my_type() :: ...

[contexts.callback]
convention = "snake_case"              # -callback init(Args) -> ...

[contexts.behaviour]
convention = "snake_case"              # -behaviour(gen_server).

[contexts.application]
convention = "snake_case"              # OTP application names

[contexts.file]
convention = "snake_case"              # my_module.erl

[patterns]
factory = "new"                        # new/0, new/1 — constructor convention
handle_call = "handle_call"            # OTP gen_server callback
handle_cast = "handle_cast"            # OTP gen_server callback
handle_info = "handle_info"            # OTP gen_server callback
init = "init"                          # OTP init/1 callback
terminate = "terminate"                # OTP terminate/2 callback
predicate = "is_{name}"               # is_alive, is_process_alive
converter = "{source}_to_{target}"     # list_to_binary, integer_to_list
type = "{name}"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
