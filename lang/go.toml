version = 1
name = "go"

convention = "camelCase"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "camelCase"

[contexts.exported_variable]
convention = "PascalCase"

[contexts.function]
convention = "camelCase"

[contexts.exported_function]
convention = "PascalCase"

[contexts.type]
convention = "PascalCase"

[contexts.interface]
convention = "PascalCase"
suffix = "er"

[contexts.struct]
convention = "PascalCase"

[contexts.constant]
convention = "PascalCase"

[contexts.exported_constant]
convention = "PascalCase"

[contexts.method]
convention = "camelCase"

[contexts.exported_method]
convention = "PascalCase"

[contexts.parameter]
convention = "camelCase"

[contexts.package]
convention = "lowercase"

[contexts.file]
convention = "snake_case"

[patterns]
factory = "New{Name}"
getter = "{Name}"
setter = "Set{Name}"
predicate = "Is{Name}"
type = "{Name}"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
