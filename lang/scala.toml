version = 1
name = "scala"

convention = "camelCase"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "camelCase"

[contexts.val]
convention = "camelCase"          # immutable binding (preferred)

[contexts.var]
convention = "camelCase"          # mutable binding (discouraged)

[contexts.function]
convention = "camelCase"

[contexts.method]
convention = "camelCase"

[contexts.type]
convention = "PascalCase"

[contexts.class]
convention = "PascalCase"

[contexts.trait]
convention = "PascalCase"

[contexts.object]
convention = "PascalCase"         # companion objects

[contexts.case_class]
convention = "PascalCase"

[contexts.type_parameter]
convention = "PascalCase"         # single letter: A, B, F

[contexts.constant]
convention = "PascalCase"         # Scala constants are PascalCase, not UPPER_SNAKE

[contexts.package]
convention = "snake_case"         # com.example.my_package (or lowercase)

[contexts.parameter]
convention = "camelCase"

[patterns]
factory = "apply"                 # companion object apply() — List(1,2,3)
unapply = "unapply"              # pattern matching extractor
predicate = "is{Name}"
converter = "to{Name}"           # toList, toString, toMap
getter = "{name}"
setter = "{name}_="              # assignment syntax sugar

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
