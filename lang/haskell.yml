version: 1
name: haskell

convention: camelCase
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: camelCase
  function:
    convention: camelCase
  type:
    convention: PascalCase
  type_class:
    convention: PascalCase
  data_constructor:
    convention: PascalCase
  type_variable:
    convention: camelCase          # lowercase single letter or short word: a, m, f
  module:
    convention: PascalCase         # Data.Map, Control.Monad
  field:
    convention: camelCase          # record fields are camelCase
  operator:
    convention: symbolic           # <$>, >>=, <|>, etc.

# Haskell has no constants — everything is immutable by default
# No UPPER_SNAKE convention needed

patterns:
  factory: "mk{Name}"             # mkFoo pattern
  predicate: "is{Name}"           # isFoo, isNothing, isJust
  getter: "get{Name}"             # for IO/monadic extraction
  unwrap: "un{Name}"              # unFoo to unwrap newtype: unName, unAge
  converter: "to{Name}"           # toList, toInteger
  from: "from{Name}"              # fromList, fromInteger
  with: "with{Name}"              # withFile, withResource (bracket pattern)

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
