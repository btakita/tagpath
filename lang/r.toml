version = 1
name = "r"

convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

# R has a messy history: dot.case (legacy), snake_case (tidyverse), camelCase (some packages)
# Tidyverse/modern R prefers snake_case

[contexts.variable]
convention = "snake_case"

[contexts.function]
convention = "snake_case"

[contexts.class_s3]
convention = "snake_case"         # S3 classes: lowercase

[contexts.class_s4]
convention = "PascalCase"         # S4 classes: PascalCase

[contexts.class_r5]
convention = "PascalCase"         # R5/Reference classes: PascalCase

[contexts.method]
convention = "snake_case"

[contexts.constant]
convention = "UPPER_SNAKE_CASE"

[contexts.package]
convention = "camelCase"          # or PascalCase — varies (ggplot2, dplyr, stringr)

[contexts.parameter]
convention = "snake_case"

[contexts.column]
convention = "snake_case"         # data frame column names

# Legacy dot.case still appears in base R: is.na, as.character, data.frame
[legacy]
convention = "dot_case"           # data.frame, is.na, as.character
separator = "."

[patterns]
predicate = "is_{name}"          # or is.name (legacy)
converter = "as_{name}"          # or as.name (legacy)
getter = "{name}"
setter = "{name}<-"              # replacement function: `names<-`

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
