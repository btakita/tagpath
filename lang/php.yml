version: 1
name: php

convention: camelCase
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: camelCase
    prefix: "$"
  method:
    convention: camelCase
  function:
    convention: snake_case
  class:
    convention: PascalCase
  interface:
    convention: PascalCase
  trait:
    convention: PascalCase
  enum:
    convention: PascalCase
  enum_member:
    convention: PascalCase
  constant:
    convention: UPPER_SNAKE_CASE
  property:
    convention: camelCase
  parameter:
    convention: camelCase
    prefix: "$"
  namespace:
    convention: PascalCase
  file:
    convention: PascalCase

patterns:
  factory: "create{Name}"
  getter: "get{Name}"
  setter: "set{Name}"
  predicate: "is{Name}"
  type: "{Name}"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
