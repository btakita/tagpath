version = 1
name = "javascript"

convention = "camelCase"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "camelCase"

[contexts.function]
convention = "camelCase"

[contexts.class]
convention = "PascalCase"

[contexts.method]
convention = "camelCase"

[contexts.constant]
convention = "UPPER_SNAKE_CASE"

[contexts.parameter]
convention = "camelCase"

[contexts.enum_member]
convention = "PascalCase"

[contexts.file]
convention = "kebab-case"

[contexts.package]
convention = "kebab-case"

[patterns]
factory = "create_{name}"
hook = "use_{name}"
setter = "set_{name}"
signal = "{name}$"
type = "{Name}"
array = "{name}_a"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
