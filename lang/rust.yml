version: 1
name: rust

convention: snake_case
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: snake_case
  function:
    convention: snake_case
  type:
    convention: PascalCase
  trait:
    convention: PascalCase
  enum:
    convention: PascalCase
  enum_variant:
    convention: PascalCase
  constant:
    convention: UPPER_SNAKE_CASE
  static:
    convention: UPPER_SNAKE_CASE
  module:
    convention: snake_case
  macro:
    convention: snake_case
    suffix: "!"
  lifetime:
    convention: snake_case
    prefix: "'"
  crate:
    convention: snake_case

patterns:
  factory: "create_{name}"
  builder: "{name}_builder"
  setter: "set_{name}"
  getter: "{name}"
  predicate: "is_{name}"
  type: "{Name}"
  array: "{name}_list"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
