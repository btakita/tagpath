version = 1
name = "julia"

# Julia — snake_case functions, PascalCase types, ! mutation, multiple dispatch
convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "snake_case"

[contexts.function]
convention = "snake_case"              # my_function(x, y)

[contexts.macro]
convention = "snake_case"
prefix = "@"                           # @my_macro

[contexts.type]
convention = "PascalCase"              # struct MyType ... end

[contexts.abstract_type]
convention = "PascalCase"              # abstract type AbstractFoo end

[contexts.module]
convention = "PascalCase"              # module MyModule

[contexts.constant]
convention = "UPPER_SNAKE_CASE"        # const MY_CONST = 42

[contexts.parameter]
convention = "snake_case"

[contexts.type_parameter]
convention = "PascalCase"              # where T <: Number (single letter common)

[contexts.field]
convention = "snake_case"              # struct fields

[contexts.file]
convention = "PascalCase"              # MyModule.jl (matches module name)

[patterns]
bang = "{name}!"                       # sort!, push!, append! (mutating)
factory = "{Name}"                     # constructors are type name: MyType(args)
predicate = "is{name}"                # iszero, isempty, isnothing (no underscore!)
converter = "convert"                  # convert(T, x) — multiple dispatch
type = "{Name}"
getter = "get{name}"                   # getfield, getindex
setter = "set{name}!"                  # setfield!, setindex!

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
