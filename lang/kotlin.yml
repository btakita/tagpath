version: 1
name: kotlin

convention: camelCase
immutable: true
singular: true

vectors:
  join: "_"
  namespace: "__"

contexts:
  variable:
    convention: camelCase
  function:
    convention: camelCase
  class:
    convention: PascalCase
  interface:
    convention: PascalCase
  enum:
    convention: PascalCase
  enum_member:
    convention: UPPER_SNAKE_CASE
  object:
    convention: PascalCase
  constant:
    convention: UPPER_SNAKE_CASE
  property:
    convention: camelCase
  method:
    convention: camelCase
  parameter:
    convention: camelCase
  package:
    convention: lowercase
  file:
    convention: PascalCase

patterns:
  factory: "create{Name}"
  getter: "get{Name}"
  setter: "set{Name}"
  predicate: "is{Name}"
  builder: "{Name}Builder"
  type: "{Name}"

externals:
  preserve_casing: true
  join_with: "_"

tags:
  open: true
