version = 1
name = "odin"

convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "snake_case"

[contexts.procedure]
convention = "snake_case"

[contexts.type]
convention = "Ada_Case"            # PascalCase with underscores: Some_Type

[contexts.struct]
convention = "Ada_Case"

[contexts.union]
convention = "Ada_Case"

[contexts.enum]
convention = "Ada_Case"

[contexts.enum_value]
convention = "Ada_Case"

[contexts.constant]
convention = "UPPER_SNAKE_CASE"

[contexts.parameter]
convention = "snake_case"

[contexts.field]
convention = "snake_case"

[contexts.import]
convention = "snake_case"          # prefer single word

[contexts.package]
convention = "snake_case"

[contexts.file]
convention = "snake_case"

# Odin has distinct allocation semantics
# new: allocate memory for a type, return pointer (no construction)
# make: allocate underlying data for built-in types (slices, dynamic arrays, maps)
# create: allocate AND construct, return pointer to initialized value
# init: construct a value passed by pointer (no allocation)
[patterns]
new = "new"                        # allocate only, returns ^T
make = "make"                      # allocate built-in types ([]T, map[K]V)
factory = "create_{name}"          # allocate + construct
init = "init"                      # construct in-place (by pointer)
deinit = "destroy"                 # deconstruct and/or deallocate
free = "free"                      # deallocate raw pointer (paired with new)
delete = "delete"                  # deallocate built-in type (paired with make)
getter = "{name}"                  # direct access
predicate = "is_{name}"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
