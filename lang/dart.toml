version = 1
name = "dart"

convention = "camelCase"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "camelCase"

[contexts.function]
convention = "camelCase"

[contexts.method]
convention = "camelCase"

[contexts.type]
convention = "PascalCase"

[contexts.class]
convention = "PascalCase"

[contexts.mixin]
convention = "PascalCase"

[contexts.enum]
convention = "PascalCase"

[contexts.enum_value]
convention = "camelCase"

[contexts.extension]
convention = "PascalCase"

[contexts.typedef]
convention = "PascalCase"

[contexts.constant]
convention = "camelCase"          # Dart uses camelCase for const, not UPPER_SNAKE

[contexts.private]
convention = "camelCase"
prefix = "_"                     # _privateField, _privateMethod

[contexts.library]
convention = "snake_case"        # library my_library;

[contexts.parameter]
convention = "camelCase"

[contexts.named_parameter]
convention = "camelCase"         # MyWidget(isEnabled: true)

[contexts.file]
convention = "snake_case"        # my_widget.dart

[patterns]
factory = "factory"              # factory MyClass() — keyword-based
predicate = "is{Name}"
getter = "{name}"                # dart getters are just name
setter = "{name}"                # dart setters: set name(value)
converter = "to{Name}"           # toJson, toString
builder = "{name}Builder"        # Flutter pattern

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
