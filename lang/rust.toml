version = 1
name = "rust"

convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[contexts.variable]
convention = "snake_case"

[contexts.function]
convention = "snake_case"

[contexts.type]
convention = "PascalCase"

[contexts.trait]
convention = "PascalCase"

[contexts.enum]
convention = "PascalCase"

[contexts.enum_variant]
convention = "PascalCase"

[contexts.constant]
convention = "UPPER_SNAKE_CASE"

[contexts.static]
convention = "UPPER_SNAKE_CASE"

[contexts.module]
convention = "snake_case"

[contexts.macro]
convention = "snake_case"
suffix = "!"

[contexts.lifetime]
convention = "snake_case"
prefix = "'"

[contexts.crate]
convention = "snake_case"

[patterns]
factory = "create_{name}"
builder = "{name}_builder"
setter = "set_{name}"
getter = "{name}"
predicate = "is_{name}"
type = "{Name}"
array = "{name}_list"

[externals]
preserve_casing = true
join_with = "_"

[tags]
open = true
