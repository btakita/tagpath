version = 1
name = "immutable-tag"

# Base immutable tag convention — extend this in your project
convention = "snake_case"
immutable = true
singular = true

[vectors]
join = "_"
namespace = "__"

[patterns]
factory = "create_{name}"
hook = "use_{name}"
setter = "set_{name}"
signal = "{name}$"
type = "{name}_T"
array = "{name}_a"
record = "{key}_R_{value}"
map = "{key}_M_{value}"

[externals]
preserve_casing = true
join_with = "_"

[packages]
separator = "--"
pattern = "{category}--{platform}--{feature}"

[tags]
open = true
